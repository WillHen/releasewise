name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: releasewise-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: releasewise-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: releasewise-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            artifact: releasewise-darwin-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun build src/index.ts --compile --target=${{ matrix.target }} --outfile=${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            artifacts/releasewise-linux-x64/releasewise-linux-x64 \
            artifacts/releasewise-linux-arm64/releasewise-linux-arm64 \
            artifacts/releasewise-darwin-arm64/releasewise-darwin-arm64 \
            artifacts/releasewise-darwin-x64/releasewise-darwin-x64
