name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Linux binaries
        run: |
          bun build src/index.ts --compile --target=bun-linux-x64 --outfile=releasewise-linux-x64
          bun build src/index.ts --compile --target=bun-linux-arm64 --outfile=releasewise-linux-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: releasewise-linux-*

  build-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and sign macOS binaries
        # Bun pre-allocates an empty LC_CODE_SIGNATURE slot that confuses
        # codesign on first signing. The workaround is to remove the stub
        # signature and then apply an ad-hoc signature. Without this, Apple
        # Silicon macOS SIGKILLs the binary at exec time.
        run: |
          for target in darwin-arm64 darwin-x64; do
            out="releasewise-${target}"
            bun build src/index.ts --compile --target=bun-${target} --outfile="$out"
            codesign --remove-signature "$out"
            codesign --force --sign - "$out"
            codesign --verify --verbose=2 "$out"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-binaries
          path: releasewise-darwin-*

  publish:
    needs: [build-linux, build-darwin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-binaries

      - name: Download Darwin artifacts
        uses: actions/download-artifact@v4
        with:
          name: darwin-binaries

      - name: Attach binaries to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          FILES=(
            releasewise-linux-x64
            releasewise-linux-arm64
            releasewise-darwin-arm64
            releasewise-darwin-x64
          )
          # If releasewise already created the release locally, upload to it.
          # Otherwise (e.g. tag pushed manually) create it here.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${FILES[@]}" --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              "${FILES[@]}"
          fi

  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for `npm publish --provenance` to mint a signed attestation.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Setup Node for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi

      - name: Skip if version already on npm
        id: check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "releasewise@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "releasewise@${PKG_VERSION} is already published — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: bun install --frozen-lockfile

      - name: Build dist
        if: steps.check.outputs.skip != 'true'
        run: bun run build

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
