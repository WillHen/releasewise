name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Linux binaries
        run: |
          bun build src/index.ts --compile --target=bun-linux-x64 --outfile=releasewise-linux-x64
          bun build src/index.ts --compile --target=bun-linux-arm64 --outfile=releasewise-linux-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: releasewise-linux-*

  build-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build macOS binaries
        run: |
          bun build src/index.ts --compile --target=bun-darwin-arm64 --outfile=releasewise-darwin-arm64
          bun build src/index.ts --compile --target=bun-darwin-x64 --outfile=releasewise-darwin-x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-binaries
          path: releasewise-darwin-*

  publish:
    needs: [build-linux, build-darwin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-binaries

      - name: Download Darwin artifacts
        uses: actions/download-artifact@v4
        with:
          name: darwin-binaries

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            releasewise-linux-x64 \
            releasewise-linux-arm64 \
            releasewise-darwin-arm64 \
            releasewise-darwin-x64
